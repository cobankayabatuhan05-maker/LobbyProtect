name: Build LobbyProtect

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu indir
        uses: actions/checkout@v4

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Maven ile derle
        run: mvn clean package

      - name: JAR yükle
        uses: actions/upload-artifact@v4
        with:
          name: LobbyProtect
          path: target/*.jar
